name: reviewdog - PHPLint

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/reviewdog-phplint.yml'

jobs:
  phplint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install PHP Parallel Lint
        run: composer global require php-parallel-lint/php-parallel-lint

      - name: Run PHPLint with reviewdog
        uses: reviewdog/action-php-parallel-lint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          php_version: '8.2'
          working-directory: ./backend
          fail_on_error: false
